<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ផ្ទៀងផ្ទាត់ស្លាក — វត្តទេពបុរី</title>
  <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;600;700&family=Moul&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    /* ... រក្សាស្តាយ (CSS) ដ៏ស្អាតរបស់អ្នកដដែល ... */
    :root { --gold: #D4AF37; --blue: #0047AB; --dark: #002366; --green: #16a34a; --indigo: #4338ca; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Kantumruy Pro', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 16px 40px; transition: background .5s; }
    body.bg-loading { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    body.bg-matched { background: linear-gradient(150deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%); }
    body.bg-pending { background: linear-gradient(150deg, #1c1917 0%, #292524 50%, #44403c 100%); }
    body.bg-notfound { background: linear-gradient(150deg, #450a0a 0%, #7f1d1d 50%, #991b1b 100%); }
    .font-moul { font-family: 'Moul', cursive; }
    .spinner { width: 52px; height: 52px; border: 4px solid rgba(255,255,255,.12); border-top-color: var(--gold); border-radius: 50%; animation: spin .9s linear infinite; margin: 0 auto 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .cert-wrap { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; gap: 0; }
    .cert-label { display: inline-flex; align-items: center; gap: 8px; padding: 7px 20px; border-radius: 50px; font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 16px; }
    .cert-label.matched { background: rgba(165,180,252,.2); color: #a5b4fc; border: 1px solid rgba(165,180,252,.3); }
    .cert-card { width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); border-radius: 28px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,.45); }
    .cert-stripe { height: 5px; }
    .stripe-green { background: linear-gradient(90deg, #6366f1, #a5b4fc, #6366f1); }
    .stripe-gray { background: linear-gradient(90deg, #64748b, #94a3b8, #64748b); }
    .stripe-red { background: linear-gradient(90deg, #ef4444, #f87171, #ef4444); }
    .cert-header { padding: 20px 22px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,.07); }
    .cert-temple { font-family: 'Moul', cursive; font-size: .82rem; color: var(--gold); }
    .cert-temple-sub { font-size: .6rem; color: rgba(255,255,255,.35); letter-spacing: .06em; text-transform: uppercase; margin-top: 2px; }
    .match-body { padding: 20px 22px; }
    .queue-hero { background: linear-gradient(135deg, var(--gold) 0%, #f59e0b 100%); border-radius: 18px; padding: 16px 22px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; box-shadow: 0 6px 20px rgba(212,175,55,.3); }
    .qh-label { font-size: .68rem; font-weight: 700; color: #78350f; text-transform: uppercase; letter-spacing: .07em; }
    .qh-num { font-family: 'Moul', cursive; font-size: 3.2rem; color: #002366; line-height: 1; font-weight: 800; }
    .match-divider { display: flex; align-items: center; gap: 10px; margin: 14px 0; }
    .match-divider::before, .match-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent); }
    .match-divider span { font-size: .7rem; color: rgba(255,255,255,.3); white-space: nowrap; letter-spacing: .06em; }
    .party-block { border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; }
    .party-block.donor { background: rgba(59,130,246,.1); border: 1px solid rgba(59,130,246,.2); }
    .party-block.monk { background: rgba(168,85,247,.1); border: 1px solid rgba(168,85,247,.2); }
    .party-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800; color: white; font-family: 'Moul', cursive; flex-shrink: 0; box-shadow: 0 4px 12px rgba(0,0,0,.25); }
    .party-avatar.donor-av { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
    .party-avatar.monk-av-icon { background: linear-gradient(135deg, #7c3aed, #6d28d9); font-size: 26px; }
    .party-name { font-size: 1rem; font-weight: 800; color: white; line-height: 1.2; }
    .party-sub { font-size: .75rem; color: rgba(255,255,255,.5); margin-top: 2px; }
    .party-phone { font-size: .95rem; font-weight: 800; color: #a5b4fc; }
    .connector { text-align: center; font-size: 1.2rem; margin: 6px 0; color: rgba(255,255,255,.2); }
    .cert-footer { padding: 14px 22px; border-top: 1px solid rgba(255,255,255,.06); display: flex; align-items: center; justify-content: space-between; }
    .cf-ts { font-size: .64rem; color: rgba(255,255,255,.3); }
    .cf-seal { font-family: 'Moul', cursive; font-size: .62rem; color: rgba(212,175,55,.4); text-align: right; }
    .rescan-notice { background: rgba(251,191,36,.08); border: 1px solid rgba(251,191,36,.2); border-radius: 12px; padding: 12px 16px; margin-top: 14px; display: flex; align-items: flex-start; gap: 10px; }
    .rn-text { font-size: .75rem; color: rgba(251,191,36,.85); }
    .hidden { display: none !important; }
    .back-link { margin-top: 20px; color: rgba(255,255,255,.3); font-size: .76rem; text-decoration: none; border: 1px solid rgba(255,255,255,.12); border-radius: 50px; padding: 8px 22px; transition: .2s; }
  </style>
</head>
<body class="bg-loading">

<div id="sec-loading">
  <div class="spinner"></div>
  <div style="color:white; font-size:0.8rem">កំពុងផ្ទៀងផ្ទាត់...</div>
</div>

<div id="sec-matched" class="cert-wrap hidden">
  <span class="cert-label matched">✅ ផ្ទៀងផ្ទាត់ជោគជ័យ</span>

  <div class="cert-card">
    <div class="cert-stripe stripe-green"></div>
    <div class="cert-header">
      <div>
        <div class="cert-temple">🏛 វត្តទេពបុរី</div>
        <div class="cert-temple-sub">បញ្ជាក់ការចាប់គូ · MATCH CONFIRMED</div>
      </div>
    </div>

    <div class="match-body">
      <div class="queue-hero">
        <div>
          <div class="qh-label">លេខរៀងមហាសំណាង</div>
          <div class="qh-num" id="m-queue">00</div>
        </div>
        <div style="font-size: 2.5rem;">🎖️</div>
      </div>

      <div class="match-divider"><span>ម្ចាស់សទ្ធា</span></div>
      <div class="party-block donor">
        <div class="party-avatar donor-av" id="m-donor-av">?</div>
        <div>
          <div class="party-name" id="m-donor-name">—</div>
          <div class="party-sub" id="m-donor-village">—</div>
        </div>
      </div>

      <div class="connector">⬇ ចាប់ចំ ⬇</div>

      <div class="match-divider"><span>ព្រះតេជគុណ</span></div>
      <div class="party-block monk">
        <div class="party-avatar monk-av-icon">🙏</div>
        <div>
          <div class="party-phone" id="m-monk-phone">ពុំទាន់មានទិន្នន័យ</div>
          <div class="party-sub">ព្រះសង្ឃដែលចាប់បាន</div>
        </div>
      </div>

      <div id="m-rescan-box" class="rescan-notice hidden">
        <div class="rn-text">⚠️ <b>QR នេះបានស្កែនរួចហើយ</b><br><span id="m-rescan-time"></span></div>
      </div>
    </div>

    <div class="cert-footer">
      <div class="cf-ts" id="m-ts">---</div>
      <div class="cf-seal">🏛 TEPBOREY</div>
    </div>
  </div>
  <a href="index.html" class="back-link">← ត្រឡប់</a>
</div>

<div id="sec-pending" class="cert-wrap hidden">
    </div>

<div id="sec-notfound" class="cert-wrap hidden">
    <h2 style="color:white">រកមិនឃើញទិន្នន័យ</h2>
    <a href="index.html" class="back-link">← ត្រឡប់</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/data.js"></script>

<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const memberId = params.get('id');

  if (!memberId) {
    document.body.className = 'bg-notfound';
    document.getElementById('sec-loading').classList.add('hidden');
    document.getElementById('sec-notfound').classList.remove('hidden');
    return;
  }

  try {
    const result = await DB.markQRScanned(memberId);
    document.getElementById('sec-loading').classList.add('hidden');

    if (result.notFound) {
      document.body.className = 'bg-notfound';
      document.getElementById('sec-notfound').classList.remove('hidden');
      return;
    }

    const m = result.member;

    // ប្រសិនបើ Status ជា picked គឺបង្ហាញផ្ទាំង Matched (ឃើញទាំងសងខាង)
    if (m.status === 'picked') {
      document.body.className = 'bg-matched';
      document.getElementById('m-queue').textContent = String(m.queueNumber || 0).padStart(2, '0');
      document.getElementById('m-donor-av').textContent = m.name ? m.name.slice(0, 1) : '?';
      document.getElementById('m-donor-name').textContent = m.name || '—';
      document.getElementById('m-donor-village').textContent = '📍 ' + (m.village || '—');
      
      // បង្ហាញលេខទូរស័ព្ទលោក (pickedBy)
      document.getElementById('m-monk-phone').textContent = m.pickedBy ? '📞 ' + m.pickedBy : 'កំពុងទាញទិន្នន័យ...';
      
      document.getElementById('m-ts').textContent = 'ផ្ទៀងផ្ទាត់នៅ៖ ' + new Date().toLocaleTimeString('km-KH');
      
      if (result.alreadyVerified) {
        document.getElementById('m-rescan-box').classList.remove('hidden');
        document.getElementById('m-rescan-time').textContent = 'ស្កែនដំបូង៖ ' + result.verifiedAt.toLocaleString('km-KH');
      }

      document.getElementById('sec-matched').classList.remove('hidden');
    } else {
      // បង្ហាញផ្ទាំង Pending (រង់ចាំ)
      document.body.className = 'bg-pending';
      // ... កូដបំពេញទិន្នន័យ Pending ...
      document.getElementById('sec-pending').classList.remove('hidden');
    }

  } catch (e) {
    console.error(e);
    document.body.className = 'bg-notfound';
    document.getElementById('sec-notfound').classList.remove('hidden');
  }
})();
</script>
</body>
</html>
